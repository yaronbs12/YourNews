services:
  app:
    build: .
    container_name: yournews-app
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16
    container_name: yournews-postgres
    environment:
      POSTGRES_DB: yournews
      POSTGRES_USER: yournews
      POSTGRES_PASSWORD: yournews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
